<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FreshBites App</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        /* --- Dynamic Theme Variables --- */
        :root {
            --primary: #e67e22;
            --success: #27ae60;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #2d3436;
            --subtext: #636e72;
            --input: #ededed;
            --card-shadow: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --subtext: #b2bec3;
            --input: #2d2d2d;
            --card-shadow: rgba(0,0,0,0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 80px;
        }

        /* --- Header --- */
        header {
            background: var(--surface);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 10px var(--card-shadow);
        }

        .app-logo { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        .header-actions { display: flex; align-items: center; gap: 15px; }

        .theme-toggle {
            cursor: pointer;
            font-size: 1.2rem;
            background: var(--input);
            padding: 5px 10px;
            border-radius: 10px;
        }

        /* --- Bottom Nav --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--surface);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -2px 20px rgba(0,0,0,0.1);
            z-index: 1000;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        .nav-item {
            text-align: center;
            color: var(--subtext);
            font-size: 0.7rem;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 2px; }

        /* --- UI Elements --- */
        .search-wrapper { padding: 15px 20px; }
        #item-search {
            width: 100%;
            padding: 14px 20px;
            background: var(--input);
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            outline: none;
            color: var(--text);
        }

        .app-container { padding: 10px 20px; }
        .section-label { font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; }

        .food-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .food-card {
            background: var(--surface);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 12px var(--card-shadow);
            display: flex;
            flex-direction: column;
        }

        .food-card:active { transform: scale(0.96); }

        .food-image { width: 100%; height: 120px; object-fit: cover; }
        .food-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .food-name { font-size: 0.95rem; font-weight: 700; height: 40px; }
        .price { color: var(--primary); font-weight: 800; font-size: 1.1rem; margin: 5px 0; }

        /* --- Main Page Qty Controls --- */
        .main-qty-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--input);
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 10px;
        }
        .main-qty-btn {
            width: 28px; height: 28px;
            border: none;
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            font-weight: bold;
            cursor: pointer;
        }
        .main-qty-val { font-weight: 700; font-size: 0.9rem; }

        .btn-group { display: flex; gap: 5px; }
        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-cart { background: var(--input); color: var(--text); }
        .btn-buy { background: var(--primary); color: white; }

        /* --- Modals --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            align-items: flex-end;
        }

        .modal-content {
            background: var(--surface);
            width: 100%;
            padding: 30px 20px;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            animation: slideUp 0.3s ease-out;
            max-height: 85vh;
            overflow-y: auto;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .input-group input, .input-group textarea {
            width: 100%; padding: 15px; margin: 8px 0; 
            border: 1px solid var(--input); 
            border-radius: 12px; 
            background: var(--input);
            color: var(--text);
        }

        .submit-btn {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 15px; font-weight: 700; margin-top: 15px;
            cursor: pointer;
        }

        /* --- Secondary Button (Continue/Back) --- */
        .secondary-btn {
            width: 100%;
            padding: 14px;
            background: var(--input);
            color: var(--text);
            border: none;
            border-radius: 15px;
            font-weight: 700;
            margin-top: 15px;
            cursor: pointer;
            text-align: center;
        }

        /* --- Cart Item Styling --- */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--input);
            padding: 12px;
            border-radius: 18px;
            margin-bottom: 12px;
            text-align: left;
        }
        .cart-item-img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; }
        .cart-item-info { flex: 1; cursor: pointer; }
        .cart-item-info h4 { font-size: 0.9rem; margin-bottom: 2px; }
        
        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            padding: 4px 8px;
            border-radius: 10px;
        }
        .qty-btn {
            width: 24px; height: 24px;
            border-radius: 6px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .qty-val { font-weight: 800; font-size: 0.9rem; min-width: 15px; text-align: center; }

        .remove-item {
            color: #ff4757;
            font-size: 1.4rem;
            font-weight: bold;
            margin-left: 5px;
            cursor: pointer;
        }

        .total-container {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed var(--input);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- Success Animation --- */
        .success-circle {
            width: 80px; height: 80px; background: var(--success); border-radius: 50%;
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .check-icon {
            width: 35px; height: 18px; border-left: 6px solid white; border-bottom: 6px solid white;
            transform: rotate(-45deg); margin-top: -5px;
            opacity: 0;
            animation: drawCheck 0.4s 0.3s forwards;
        }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes drawCheck { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body data-theme="light">

    <header>
        <div class="app-logo">FreshBites</div>
        <div class="header-actions">
            <div class="theme-toggle" id="theme-btn" onclick="toggleTheme()">🌙</div>
            <div id="cart-counter" onclick="toggleModal('cartModal')" style="background: var(--primary); color: white; padding: 5px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 800; cursor: pointer;">0</div>
        </div>
    </header>

    <div class="search-wrapper">
        <input type="text" id="item-search" placeholder="Hungry? Search here..." onkeyup="searchProducts()">
    </div>

    <main class="app-container">
        <div class="section-label">Popular Picks</div>
        
        <div class="food-grid" id="food-grid">
            <div class="food-card" id="burger-item">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400" class="food-image">
                <div class="food-info">
                    <div class="food-name">Classic Burger</div>
                    <div class="price">$12.99</div>
                    <div class="main-qty-selector">
                        <button class="main-qty-btn" onclick="changeMainQty('burger-item', -1)">-</button>
                        <span class="main-qty-val" id="qty-burger-item">1</span>
                        <button class="main-qty-btn" onclick="changeMainQty('burger-item', 1)">+</button>
                    </div>
                    <div class="btn-group">
                        <button class="action-btn btn-cart">Add</button>
                        <button class="action-btn btn-buy">Buy</button>
                    </div>
                </div>
            </div>
            <div class="food-card" id="pizza-item">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400" class="food-image">
                <div class="food-info">
                    <div class="food-name">Margherita Pizza</div>
                    <div class="price">$14.50</div>
                    <div class="main-qty-selector">
                        <button class="main-qty-btn" onclick="changeMainQty('pizza-item', -1)">-</button>
                        <span class="main-qty-val" id="qty-pizza-item">1</span>
                        <button class="main-qty-btn" onclick="changeMainQty('pizza-item', 1)">+</button>
                    </div>
                    <div class="btn-group">
                        <button class="action-btn btn-cart">Add</button>
                        <button class="action-btn btn-buy">Buy</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a class="nav-item active" onclick="location.reload()"><span class="nav-icon">🏠</span>Home</a>
        <a class="nav-item" onclick="toggleModal('cartModal')"><span class="nav-icon">🛒</span>Cart</a>
        <a class="nav-item" onclick="toggleModal('userModal')"><span class="nav-icon">👤</span>Account</a>
    </nav>

    <div id="cartModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="text-align: left;">Your Basket</h2>
                <span onclick="clearCart()" style="color: #ff4757; font-weight: 700; cursor: pointer; font-size: 0.8rem;">CLEAR ALL</span>
            </div>
            <div id="cart-items-list"></div>
            <div id="cart-empty-msg" style="color: var(--subtext); padding: 40px 0; text-align: center;">Your cart is empty.</div>
            
            <div id="cart-footer" style="display: none;">
                <div class="total-container">
                    <span style="font-weight: 700; font-size: 1.1rem;">Total Amount:</span>
                    <span id="grand-total" style="color: var(--primary); font-weight: 800; font-size: 1.3rem;">$0.00</span>
                </div>
                <button class="submit-btn" onclick="checkoutCart()">Proceed to Checkout</button>
            </div>
            <button class="secondary-btn" onclick="toggleModal('cartModal')">Continue Browsing</button>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <h2 style="margin-bottom:15px;">Your Profile</h2>
            <div class="input-group">
                <input type="text" id="userName" placeholder="Full Name">
                <input type="email" id="userEmail" placeholder="Email Address">
                <textarea id="userAddress" placeholder="Delivery Address" rows="2"></textarea>
            </div>
            <button class="submit-btn" onclick="saveUserDetails()">Update Account</button>
            <button class="secondary-btn" onclick="toggleModal('userModal')">Back to Shop</button>
        </div>
    </div>

    <div id="payModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <h2 id="payItemDetail" style="margin-bottom:10px;"></h2>
            <p id="payAmountDetail" style="color:var(--primary); font-weight: 800; margin-bottom:20px; font-size: 1.2rem;"></p>
            <button id="payOnlineBtn" class="submit-btn" style="background:var(--success);" onclick="processOrder('Online')">💳 Pay Online</button>
            <button id="payCashBtn" class="submit-btn" style="background:#2d3436;" onclick="processOrder('Cash')">💵 Cash on Delivery</button>
            <p onclick="toggleModal('payModal')" style="margin-top:15px; color:var(--subtext); cursor:pointer;">Cancel</p>
        </div>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <div class="success-circle"><div class="check-icon"></div></div>
            <h2 id="successMsgTitle">Order Confirmed!</h2>
            <p style="color:var(--subtext); margin-top:5px;">Your meal is being prepared.</p>
            <button class="submit-btn" onclick="toggleModal('successModal')">Done</button>
        </div>
    </div>

    <script>
        const successSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');
        (function() { emailjs.init("g7dPxlZeGAIFCQTB2"); })();

        let cart = {};
        let currentDirectBuy = null;

        // --- NEW: Load saved data on startup ---
        window.onload = function() {
            const savedCart = localStorage.getItem('foodShopCart');
            if(savedCart) {
                cart = JSON.parse(savedCart);
                updateCartUI();
            }

            const savedUser = localStorage.getItem('foodShopUser');
            if(savedUser) {
                const user = JSON.parse(savedUser);
                document.getElementById('userName').value = user.name || '';
                document.getElementById('userEmail').value = user.email || '';
                document.getElementById('userAddress').value = user.address || '';
            }

            const savedTheme = localStorage.getItem('theme');
            if(savedTheme) {
                document.body.setAttribute('data-theme', savedTheme);
                document.getElementById('theme-btn').innerText = savedTheme === 'dark' ? '☀️' : '🌙';
            }
        };

        function vibrate() {
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(40); 
        }

        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            document.getElementById('theme-btn').innerText = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', newTheme);
            vibrate();
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
            vibrate();
        }

        function changeMainQty(id, delta) {
            const el = document.getElementById(`qty-${id}`);
            let val = parseInt(el.innerText) + delta;
            if (val < 1) val = 1;
            el.innerText = val;
            vibrate();
        }

        function searchProducts() {
            const input = document.getElementById('item-search').value.toLowerCase();
            const cards = document.getElementsByClassName('food-card');
            
            for (let card of cards) {
                const name = card.querySelector('.food-name').innerText.toLowerCase();
                card.style.display = name.includes(input) ? "flex" : "none";
            }
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items-list');
            const counter = document.getElementById('cart-counter');
            const footer = document.getElementById('cart-footer');
            const emptyMsg = document.getElementById('cart-empty-msg');
            const totalEl = document.getElementById('grand-total');
            
            list.innerHTML = '';
            let grandTotal = 0;
            let totalItemsCount = 0;

            Object.keys(cart).forEach(id => {
                const item = cart[id];
                const itemPriceNum = parseFloat(item.price.replace('$', ''));
                grandTotal += itemPriceNum * item.qty;
                totalItemsCount += item.qty;

                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <img src="${item.img}" class="cart-item-img">
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <p style="color:var(--primary); font-weight:700;">${item.price}</p>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateCartQty('${id}', -1)">-</button>
                        <span class="qty-val">${item.qty}</span>
                        <button class="qty-btn" onclick="updateCartQty('${id}', 1)">+</button>
                    </div>
                    <span class="remove-item" onclick="removeFromCart('${id}')">×</span>
                `;
                list.appendChild(div);
            });

            counter.innerText = totalItemsCount;
            totalEl.innerText = `$${grandTotal.toFixed(2)}`;
            emptyMsg.style.display = totalItemsCount ? 'none' : 'block';
            footer.style.display = totalItemsCount ? 'block' : 'none';
            
            // Save cart state after any update
            localStorage.setItem('foodShopCart', JSON.stringify(cart));
        }

        function updateCartQty(id, delta) {
            if (cart[id]) {
                cart[id].qty += delta;
                if (cart[id].qty <= 0) delete cart[id];
                vibrate();
                updateCartUI();
            }
        }

        function removeFromCart(id) {
            delete cart[id];
            vibrate();
            updateCartUI();
        }

        function clearCart() {
            cart = {};
            vibrate();
            updateCartUI();
        }

        document.getElementById('food-grid').addEventListener('click', (e) => {
            const card = e.target.closest('.food-card');
            if(!card) return;
            const id = card.id;
            const name = card.querySelector('.food-name').innerText;
            const price = card.querySelector('.price').innerText;
            const img = card.querySelector('.food-image').src;
            const selectedQty = parseInt(document.getElementById(`qty-${id}`).innerText);

            if(e.target.classList.contains('btn-cart')) {
                if (cart[id]) cart[id].qty += selectedQty;
                else cart[id] = { name, price, img, qty: selectedQty };
                document.getElementById(`qty-${id}`).innerText = "1";
                vibrate();
                updateCartUI();
            }

            if(e.target.classList.contains('btn-buy')) {
                const user = localStorage.getItem('foodShopUser');
                currentDirectBuy = { name, price, qty: selectedQty };
                
                // Block purchase if details are missing
                if(!user) { 
                    alert("Please enter your delivery details before buying.");
                    toggleModal('userModal'); 
                    return; 
                }
                
                const unitPrice = parseFloat(price.replace('$', ''));
                const total = (unitPrice * selectedQty).toFixed(2);
                document.getElementById('payItemDetail').innerText = `${selectedQty}x ${name}`;
                document.getElementById('payAmountDetail').innerText = `Total: $${total}`;
                toggleModal('payModal');
            }
        });

        function checkoutCart() {
            const user = localStorage.getItem('foodShopUser');
            if(!user) { 
                alert("Please enter your delivery details before checking out.");
                toggleModal('userModal'); 
                return; 
            }
            
            currentDirectBuy = null; 
            const total = document.getElementById('grand-total').innerText;
            const itemCount = document.getElementById('cart-counter').innerText;
            document.getElementById('payItemDetail').innerText = `Basket: ${itemCount} items`;
            document.getElementById('payAmountDetail').innerText = `Total: ${total}`;
            toggleModal('cartModal');
            toggleModal('payModal');
        }

        function saveUserDetails() {
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const address = document.getElementById('userAddress').value.trim();
            if(!name || !email || !address) return alert("Please fill all details to continue.");
            
            localStorage.setItem('foodShopUser', JSON.stringify({name, email, address}));
            toggleModal('userModal');
            vibrate();
            
            // Continue to payment if they were in the middle of a "Buy" or Checkout
            if(currentDirectBuy) {
                const total = (parseFloat(currentDirectBuy.price.replace('$', '')) * currentDirectBuy.qty).toFixed(2);
                document.getElementById('payItemDetail').innerText = `${currentDirectBuy.qty}x ${currentDirectBuy.name}`;
                document.getElementById('payAmountDetail').innerText = `Total: $${total}`;
                toggleModal('payModal');
            } else if (Object.keys(cart).length > 0) {
                checkoutCart();
            }
        }

        function processOrder(method) {
            const userData = JSON.parse(localStorage.getItem('foodShopUser'));
            const total = document.getElementById('payAmountDetail').innerText;
            
            let orderSummary = "";
            if(currentDirectBuy) {
                orderSummary = `${currentDirectBuy.qty}x ${currentDirectBuy.name}`;
            } else {
                orderSummary = Object.values(cart).map(item => `${item.qty}x ${item.name}`).join(", ");
            }

            const btn = method === 'Online' ? document.getElementById('payOnlineBtn') : document.getElementById('payCashBtn');
            const originalText = btn.innerText;
            btn.innerText = "Processing...";
            btn.disabled = true;

            emailjs.send('service_n0rlufv', 'template_5z1za9p', {
                user_name: userData.name,
                user_email: userData.email,
                user_address: userData.address,
                order_details: orderSummary,
                total_amount: total,
                payment_method: method
            }).then(() => {
                toggleModal('payModal');
                successSound.play();
                vibrate();
                document.getElementById('successMsgTitle').innerText = method === 'Online' ? "Payment Successful!" : "Order Placed!";
                toggleModal('successModal');
                
                btn.innerText = originalText;
                btn.disabled = false;
                clearCart();
                currentDirectBuy = null;
            }, (err) => {
                alert("Order failed to send.");
                btn.innerText = originalText;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
